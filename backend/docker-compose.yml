services:
  consul:
    image: consul:1.15
    container_name: chatbot-consul
    ports:
      - "18500:8500"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    volumes:
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "service.name=redis"
      - "service.port=6379"

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-mcp
    command: python mcp_module/start.py
    ports:
      - "8888:8080"
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID}
      - DINGTALK_CLIENT_SECRET=${DINGTALK_CLIENT_SECRET}
      - DINGTALK_USER_ID=${DINGTALK_USER_ID}
      - CONSUL_HOST=${CONSUL_HOST:-consul}
    labels:
      - "service.name=mcp"
      - "service.port=8080"
    depends_on:
      consul:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-app
    depends_on:
      consul:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp:
        condition: service_started
    restart: unless-stopped
    ports:
      - "18000:5000"
    volumes:
      - ./db/chroma:/app/db/chroma
      - ./knowledge_base:/app/knowledge_base
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID}
      - DINGTALK_CLIENT_SECRET=${DINGTALK_CLIENT_SECRET}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CHECKPOINT_STORAGE=${CHECKPOINT_STORAGE:-redis}
      - CONSUL_HOST=${CONSUL_HOST:-consul}
    labels:
      - "service.name=app"
      - "service.port=8000"

  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-db
    command: python db.py
    restart: unless-stopped
    ports:
      - "15001:5001"
    volumes:
      - ./db/chroma:/app/db/chroma
      - ./knowledge_base:/app/knowledge_base
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - VECTOR_STORE_PERSIST_DIRECTORY=/app/db/chroma
      - KNOWLEDGE_BASE_DIR=/app/knowledge_base
      - CONSUL_HOST=${CONSUL_HOST:-consul}
    labels:
      - "service.name=db"
      - "service.port=5001"
    depends_on:
      consul:
        condition: service_healthy

  db-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: chatbot-db-frontend
    restart: unless-stopped
    ports:
      - "15174:80"
    depends_on:
      - db
    labels:
      - "service.name=db-frontend"
      - "service.port=80"

  gateway:
    image: nginx:alpine
    container_name: chatbot-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - db
      - mcp
    labels:
      - "service.name=gateway"
      - "service.port=80"

volumes:
  redis-data:
    driver: local
  consul-data:
    driver: local
