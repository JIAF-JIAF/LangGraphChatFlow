version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-mcp
    command: python mcp_module/start.py
    ports:
      - "8888:8080"
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID}
      - DINGTALK_CLIENT_SECRET=${DINGTALK_CLIENT_SECRET}
      - DINGTALK_USER_ID=${DINGTALK_USER_ID}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-app
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_started
    restart: unless-stopped
    ports:
      - "18000:8000"
    volumes:
      - ./db/chroma:/app/db/chroma
      - ./knowledge_base:/app/knowledge_base
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID}
      - DINGTALK_CLIENT_SECRET=${DINGTALK_CLIENT_SECRET}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CHECKPOINT_STORAGE=${CHECKPOINT_STORAGE:-redis}

  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-db
    command: python db.py
    restart: unless-stopped
    ports:
      - "15001:5001"
    volumes:
      - ./db/chroma:/app/db/chroma
      - ./knowledge_base:/app/knowledge_base
    environment:
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL:-qwen3.5-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - VECTOR_STORE_PERSIST_DIRECTORY=/app/db/chroma
      - KNOWLEDGE_BASE_DIR=/app/knowledge_base

  db-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: chatbot-db-frontend
    restart: unless-stopped
    ports:
      - "15174:80"
    depends_on:
      - db

volumes:
  redis-data:
    driver: local